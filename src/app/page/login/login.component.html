<main>
  <form id="login_form" class="form_class">
    <div class="form_div">
      <label>Login:</label>
      <input class="field_class" type="text" autofocus />
      <label>Password:</label>
      <input id="pass" class="field_class" type="password" />
      <button
        class="submit_class"
        type="submit"
        form="login_form"
        (click)="redirigir()"
      >
        Entrar
      </button>
    </div>
  </form>
</main>
